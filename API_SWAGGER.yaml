        entries:
          type: string
          description: JSON array string
        characterIds:
          type: array
          items:
            type: string
            format: uuid
        personaIds:
          type: array
          items:
            type: string
            format: uuid
        avatar:
          type: string
          format: binary

    LorebookEntry:
      type: object
      required:
        - keywords
        - context
      properties:
        keywords:
          type: array
          items:
            type: string
        context:
          type: string
        isEnabled:
          type: boolean
          default: true
        priority:
          type: integer
          default: 0

    CreateChatRequest:
      type: object
      properties:
        characterId:
          type: string
          format: uuid
          nullable: true
          description: Optional - Associate chat with a character
        realmId:
          type: string
          format: uuid
          nullable: true
          description: Optional - Link chat to a realm
        folderId:
          type: string
          format: uuid
          nullable: true
          description: Optional - Organize chat in a folder
        modelId:
          type: string
          format: uuid
          nullable: true
          description: |
            Optional - AI model for this chat.
            If not provided, the default model will be automatically assigned.
            The default model must be configured in the system.
        title:
          type: string
          maxLength: 500
          nullable: true
          description: Optional - Custom chat title

    UpdateChatRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
          nullable: true
        folderId:
          type: string
          format: uuid
          nullable: true
        modelId:
          type: string
          format: uuid
          nullable: true
          description: Switch AI model for existing chat

    Chat:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        characterId:
          type: string
          format: uuid
          nullable: true
        realmId:
          type: string
          format: uuid
          nullable: true
        folderId:
          type: string
          format: uuid
          nullable: true
        modelId:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          nullable: true
        isActive:
          type: boolean
          default: true
        isPinned:
          type: boolean
          default: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        messageCount:
          type: integer
          description: Number of messages in the chat

    ChatResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            chat:
              $ref: '#/components/schemas/Chat'
        message:
          type: string
          example: Chat retrieved successfully

    ChatListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            chats:
              type: array
              items:
                $ref: '#/components/schemas/Chat'
            pagination:
              type: object
              properties:
                page:
                  type: integer
                limit:
                  type: integer
                total:
                  type: integer
                totalPages:
                  type: integer
        message:
          type: string
          example: Chats retrieved successfully

    CreateMessageRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 10000
          description: |
            Message content to send to the AI.
            
            **Note:** The AI will use the full conversation history as context,
            so you can reference previous messages naturally.
          example: "What is the capital of France?"
        role:
          type: string
          enum: [user, assistant, system]
          default: user
          description: |
            Message role. 
            - `user`: User message (default)
            - `assistant`: Assistant/AI message (for manual insertion)
            - `system`: System message (for instructions/context)

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique message identifier
        chatId:
          type: string
          format: uuid
          description: ID of the chat this message belongs to
        role:
          type: string
          enum: [user, assistant, system]
          description: Message role (user, assistant, or system)
        content:
          type: string
          description: Message content
        tokensUsed:
          type: integer
          nullable: true
          description: |
            Number of tokens used for this message (for AI responses).
            Includes both prompt and completion tokens.
            Null for user messages or if token usage is not available.
        metadata:
          type: object
          nullable: true
          description: |
            Additional metadata about the message.
            For AI responses, includes:
            - `model`: Model name used (e.g., "gpt-4o-mini")
            - `provider`: AI provider (e.g., "openai", "gemini", "aws")
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the message was created

    SendMessageResponse:
      type: object
      description: |
        Response containing both the user message and the AI assistant's response.
        Both messages are saved to the database and returned together.
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            userMessage:
              $ref: '#/components/schemas/Message'
              description: The user's message that was sent
            assistantMessage:
              $ref: '#/components/schemas/Message'
              description: |
                The AI assistant's response.
                Includes token usage and model metadata.
        message:
          type: string
          example: Message sent successfully

    MessageListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            messages:
              type: array
              items:
                $ref: '#/components/schemas/Message'
            pagination:
              type: object
              properties:
                page:
                  type: integer
                limit:
                  type: integer
                total:
                  type: integer
                totalPages:
                  type: integer
        message:
          type: string
          example: Messages retrieved successfully

    Model:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique model identifier
        name:
          type: string
          description: Display name of the model
          example: "GPT-4o Mini"
        slug:
          type: string
          description: URL-friendly identifier (unique)
          example: "gpt-4o-mini"
        description:
          type: string
          nullable: true
          description: Model description
        provider:
          type: string
          description: AI provider
          enum: [openai, gemini, aws, anthropic, local]
          example: "openai"
        modelName:
          type: string
          nullable: true
          description: Specific model identifier (e.g., "gpt-4o-mini", "gemini-1.5-flash")
          example: "gpt-4o-mini"
        isActive:
          type: boolean
          description: Whether the model is active and available
          default: true
        isDefault:
          type: boolean
          description: Whether this is the default model
          default: false
        metadata:
          type: object
          nullable: true
          description: Additional configuration/metadata
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the model was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the model was last updated

    CreateModelRequest:
      type: object
      required:
        - name
        - slug
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Display name of the model
          example: "GPT-4o Mini"
        slug:
          type: string
          minLength: 1
          maxLength: 255
          pattern: '^[a-z0-9-]+$'
          description: |
            URL-friendly identifier. Must be unique.
            Only lowercase letters, numbers, and hyphens allowed.
          example: "gpt-4o-mini"
        description:
          type: string
          maxLength: 1000
          nullable: true
          description: Model description
          example: "OpenAI GPT-4o Mini model"
        provider:
          type: string
          enum: [openai, gemini, aws, anthropic, local]
          default: aws
          description: AI provider
          example: "openai"
        modelName:
          type: string
          maxLength: 255
          nullable: true
          description: Specific model identifier (e.g., "gpt-4o-mini", "gemini-1.5-flash")
          example: "gpt-4o-mini"
        isActive:
          type: boolean
          default: true
          description: Whether the model should be active and available for use
        isDefault:
          type: boolean
          default: false
          description: Whether this should be the default model for new chats
        metadata:
          type: object
          nullable: true
          description: Additional configuration/metadata as JSON object. Optional.
          additionalProperties: true

    ModelResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            model:
              $ref: '#/components/schemas/Model'
        message:
          type: string
          example: Model retrieved successfully

    ModelListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            models:
              type: array
              items:
                $ref: '#/components/schemas/Model'
        message:
          type: string
          example: Models retrieved successfully

security:
  - bearerAuth: []

services:
  redis:
    image: redis:7-alpine
    container_name: youruniverse-redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    env_file:
      - .env.production
    volumes:
      - redis_data:/data
    networks:
      - youruniverse-network

  api:
    build: .
    container_name: youruniverse-api
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - redis
    networks:
      - youruniverse-network

volumes:
  redis_data:

networks:
  youruniverse-network:
    driver: bridge
